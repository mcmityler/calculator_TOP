<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="screen">
            <p class="screenText">0</p>
        </div>
        <div class="buttons">
            <div class="funcButtons">
                <button>clear</button>
                <button>backspace</button>
            </div>
            <div class="buttonSeperator1">
                <div class="numbers">
                    <button id="numberOne">1</button>
                    <button id="numberTwo">2</button>
                    <button id="numberThree">3</button>
                    <button id="numberFour">4</button>
                    <button id="numberFive">5</button>
                    <button id="numberSix">6</button>
                    <button id="numberSeven">7</button>
                    <button id="numberEight">8</button>
                    <button id="numberNine">9</button>
                    <button id="numberZero">0</button>
                </div>
                <div class="operators">
                    <button>+</button>
                    <button>-</button>
                    <button>*</button>
                    <button>/</button>
                    <button>!</button>
                    <button>=</button>
                    <button>.</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
