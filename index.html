<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="screen">
            <p>Sadies beautiful</p>
        </div>
        <div class="buttons">
            <div class="funcButtons">
                <button>clear</button>
                <button>backspace</button>
            </div>
            <div class="buttonSeperator1">
                <div class="numbers">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>0</button>
                </div>
                <div class="operators">
                    <button>+</button>
                    <button>-</button>
                    <button>*</button>
                    <button>/</button>
                    <button>!</button>
                    <button>=</button>
                    <button>.</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
