<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="contianer">
    <div class="calculator">
        <div class="screen">
            <p class="miniScreenText">
                <span class="miniNum1">Num1</span>
                <span class="miniOperator">operator</span>
                <span class="miniNum2">Num2</span>
                <span class="miniEquals">= Answer</span>
            </p>
            <p class="screenText">0</p>
        </div>
        <div class="buttons">
            <div class="funcButtons">
                <button class="clearButton">clear</button>
                <button class="backButton">backspace</button>
            </div>
            <div class="buttonSeperator1">
                <div class="numbers">
                    <button id="numberOne">1</button>
                    <button id="numberTwo">2</button>
                    <button id="numberThree">3</button>
                    <button id="numberFour">4</button>
                    <button id="numberFive">5</button>
                    <button id="numberSix">6</button>
                    <button id="numberSeven">7</button>
                    <button id="numberEight">8</button>
                    <button id="numberNine">9</button>
                    <button id="numberZero">0</button>
                </div>
                <div class="operators">
                    <button class="add">+</button>
                    <button class="subtract">-</button>
                    <button class="multi">*</button>
                    <button class="divide">/</button>
                    <button>!</button>
                    <button class="equals">=</button>
                    <button class="decimalButton">.</button>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
